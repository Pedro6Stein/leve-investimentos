version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: leve_sqlserver
    restart: always 
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "LevePassword123!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'LevePassword123!' -Q 'SELECT 1' -C"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sqlserver_data: