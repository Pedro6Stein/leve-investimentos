<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEVE - Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uikit@3.17.11/dist/css/uikit.min.css" />
    <link rel="stylesheet" href="/shared/global.css">
    <link rel="stylesheet" href="/pages/login/login.css">
</head>
<body class="bg-cinza">
    <div class="uk-flex uk-flex-center uk-flex-middle" uk-height-viewport>
        <div class="uk-width-medium uk-padding uk-card uk-card-default redondo uk-box-shadow-large">
            <div class="uk-text-center uk-margin-bottom">
                <h2 class="uk-text-bold uk-margin-remove">LEVE</h2>
                <p class="uk-text-muted uk-margin-remove-top">Acesso ao Sistema</p>
            </div>

            <form id="loginForm" action="javascript:void(0);">
                <div class="uk-margin">
                    <div class="uk-inline uk-width-1-1">
                        <span class="uk-form-icon" uk-icon="icon: mail"></span>
                        <input id="email" class="uk-input redondo" type="email" placeholder="E-mail" required>
                    </div>
                </div>

                <div class="uk-margin">
                    <div class="uk-inline uk-width-1-1">
                        <span class="uk-form-icon" uk-icon="icon: lock"></span>
                        <input id="password" class="uk-input redondo" type="password" placeholder="Senha" required>
                    </div>
                </div>

                <div class="uk-margin">
                    <button id="loginBtn" class="uk-button uk-button-primary uk-width-1-1 redondo" type="submit">
                        Acessar Sistema
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/uikit@3.17.11/dist/js/uikit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/uikit@3.17.11/dist/js/uikit-icons.min.js"></script>
    <script type="module" src="/dist/pages/login/login.js"></script>
</body>
</html>
